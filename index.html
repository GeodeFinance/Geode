fa;\n  --text:#edeaff;\n  --tm:#706a90;\n  --td:#2e2a48;\n  --tab:72px;\n}\n\/* ── RESET ─────────────────────────────────── *\/\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}\nhtml,body{height:100%;overflow:hidden;background:var(--bg);}\nbody{font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}\ninput,select,button,textarea{font-family:'DM Sans',sans-serif;}\ninput::placeholder,textarea::placeholder{color:var(--td);}\nselect option{background:#181830;}\n::-webkit-scrollbar{display:none;}\ninput[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}\n\n\/* ── SHELL ─────────────────────────────────── *\/\n#shell{\n  position:fixed;inset:0;max-width:430px;margin:0 auto;\n  display:flex;flex-direction:column;overflow:hidden;\n}\n\n\/* ══════════════════════════════════════════\n   SPLASH\n══════════════════════════════════════════ *\/\n#splash{\n  position:fixed;inset:0;z-index:900;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  background:radial-gradient(ellipse at 50% 35%,#1c0d38 0%,#0a0618 45%,#05050f 100%);\n  transition:opacity 0.5s ease, visibility 0.5s ease;\n}\n#splash.hide{opacity:0;visibility:hidden;}\n.sp-gem{animation:gemPop 0.7s cubic-bezier(.34,1.56,.64,1) 0.2s both;}\n.sp-name{\n  font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;\n  letter-spacing:0.14em;margin-top:22px;\n  background:linear-gradient(135deg,#c4abff 0%,#e87ca0 55%,#9b7fe8 100%);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n  animation:fadeUp 0.6s ease 0.8s both;\n}\n.sp-tag{\n  font-size:11px;letter-spacing:0.28em;color:var(--tm);text-transform:uppercase;\n  margin-top:8px;animation:fadeUp 0.6s ease 1.0s both;\n}\n.sp-bar{\n  position:absolute;bottom:52px;width:100px;height:2px;\n  background:var(--s2);border-radius:2px;overflow:hidden;\n  animation:fadeUp 0.4s ease 1.2s both;\n}\n.sp-fill{\n  height:100%;background:linear-gradient(90deg,var(--gem),var(--rose));\n  animation:barLoad 1.4s ease 1.3s forwards;width:0;\n}\n@keyframes gemPop{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}\n@keyframes barLoad{to{width:100%;}}\n\n\/* ══════════════════════════════════════════\n   PAGES\n══════════════════════════════════════════ *\/\n.page{display:none;flex:1;flex-direction:column;overflow:hidden;}\n.page.show{display:flex;}\n\n\/* ══════════════════════════════════════════\n   ONBOARDING\n══════════════════════════════════════════ *\/\n#pg-onboard{background:radial-gradient(ellipse at 30% 15%,#1c0a3a 0%,#0a0a1a 55%,#05050f 100%);overflow-y:auto;padding:0;}\n.ob-wrap{padding:56px 24px 48px;min-height:100%;}\n.ob-step{display:none;}\n.ob-step.show{display:block;animation:fadeUp 0.35s ease both;}\n.ob-dots{display:flex;gap:6px;margin-bottom:28px;}\n.ob-dot{height:5px;border-radius:3px;background:var(--s3);transition:all 0.3s;}\n.ob-dot.on{background:var(--gem);flex:2;}\n.ob-dot{flex:1;}\n.ob-eyebrow{\n  display:inline-flex;align-items:center;gap:6px;\n  background:rgba(155,127,232,0.1);border:1px solid rgba(155,127,232,0.22);\n  border-radius:20px;padding:5px 14px;font-size:10px;font-weight:600;\n  color:var(--gem2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:18px;\n}\n.ob-h{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;line-height:1.1;margin-bottom:10px;}\n.ob-h em{color:var(--gem2);font-style:italic;}\n.ob-p{font-size:14px;color:var(--tm);line-height:1.65;margin-bottom:28px;}\n\n\/* ══════════════════════════════════════════\n   MAIN HEADER\n══════════════════════════════════════════ *\/\n#hdr{\n  padding:48px 18px 12px;\n  background:var(--bg);border-bottom:1px solid var(--b0);\n  display:flex;align-items:flex-end;justify-content:space-between;\n  flex-shrink:0;position:relative;z-index:10;\n}\n.hdr-logo{display:flex;align-items:center;gap:9px;cursor:pointer;}\n.hdr-wordmark{\n  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;\n  letter-spacing:0.12em;\n  background:linear-gradient(135deg,#c4abff,#e87ca0);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n}\n.hdr-right{display:flex;gap:7px;}\n.hdr-pill{\n  background:var(--s2);border:1px solid var(--b1);border-radius:20px;\n  padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;\n  color:var(--tm);transition:all 0.15s;white-space:nowrap;\n}\n.hdr-pill.accent{color:var(--gem2);border-color:rgba(155,127,232,0.28);}\n.hdr-pill:active{opacity:0.7;}\n\n\/* ══════════════════════════════════════════\n   SCROLL AREA\n══════════════════════════════════════════ *\/\n.scroll{\n  flex:1;overflow-y:auto;overflow-x:hidden;\n  padding:18px 16px calc(var(--tab) + env(safe-area-inset-bottom,0px) + 16px);\n  -webkit-overflow-scrolling:touch;\n}\n\n\/* ══════════════════════════════════════════\n   TAB BAR\n══════════════════════════════════════════ *\/\n#tabs{\n  position:fixed;bottom:0;left:50%;transform:translateX(-50%);\n  width:100%;max-width:430px;\n  height:calc(var(--tab) + env(safe-area-inset-bottom,0px));\n  background:rgba(5,5,15,0.97);backdrop-filter:blur(28px) saturate(180%);\n  border-top:1px solid var(--b1);\n  display:flex;align-items:flex-start;padding-top:9px;z-index:50;\n}\n.tb{flex:1;background:none;border:none;cursor:pointer;\n  display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 2px;}\n.tb-ic{font-size:20px;line-height:1;}\n.tb-lb{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;\n  color:var(--td);transition:color 0.2s;}\n.tb.on .tb-lb{color:var(--gem2);}\n.tb-pip{width:14px;height:2px;border-radius:1px;background:var(--gem);opacity:0;transition:opacity 0.2s;}\n.tb.on .tb-pip{opacity:1;}\n\n\/* ══════════════════════════════════════════\n   SHARED COMPONENTS\n══════════════════════════════════════════ *\/\n\/* Cards *\/\n.card{background:var(--s1);border:1px solid var(--b0);border-radius:20px;padding:18px;margin-bottom:11px;}\n.card-lbl{font-size:9.5px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.13em;margin-bottom:9px;}\n\n\/* Fields *\/\n.field{margin-bottom:13px;}\n.field label{display:block;font-size:9.5px;font-weight:700;color:var(--tm);\n  text-transform:uppercase;letter-spacing:0.13em;margin-bottom:7px;}\n.fi{width:100%;background:var(--s2);border:1px solid var(--b1);\n  border-radius:13px;padding:13px 14px;color:var(--text);font-size:15px;\n  outline:none;appearance:none;-webkit-appearance:none;transition:border-color 0.15s;resize:none;}\n.fi:focus{border-color:var(--gem);}\ntextarea.fi{min-height:72px;}\n\n\/* Buttons *\/\n.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:14px;\n  font-weight:700;cursor:pointer;letter-spacing:0.03em;transition:opacity 0.15s,transform 0.1s;}\n.btn:active{opacity:0.82;transform:scale(0.98);}\n.btn-p{background:linear-gradient(135deg,#7c6af7,#b06af0);color:#fff;}\n.btn-s{background:var(--s2);border:1px solid var(--b2);color:var(--tm);}\n.btn-g{background:var(--s2);border:none;border-radius:10px;padding:6px 12px;\n  color:var(--tm);font-size:12px;cursor:pointer;font-weight:500;width:auto;}\n.btn-d{background:rgba(240,112,112,0.1);border:none;border-radius:8px;\n  padding:4px 10px;color:var(--red);font-size:11px;cursor:pointer;width:auto;}\n.btn-ok{background:rgba(52,213,160,0.1);border:1px solid rgba(52,213,160,0.2);\n  border-radius:12px;padding:9px;color:var(--teal);font-size:13px;font-weight:600;\n  cursor:pointer;width:100%;}\n.btn-export{background:rgba(245,194,52,0.1);border:1px solid rgba(245,194,52,0.22);\n  border-radius:12px;padding:10px 14px;color:var(--amber);font-size:12px;\n  font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}\n\n\/* Numbers *\/\n.n-big{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:700;letter-spacing:-0.01em;line-height:1.05;}\n.n-med{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}\n.n-sm{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;}\n\n\/* Grid *\/\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}\n.tile{background:var(--s1);border:1px solid var(--b0);border-radius:18px;padding:14px 13px;}\n.tile-lbl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;font-weight:700;}\n\n\/* Progress *\/\n.pt{background:var(--b0);border-radius:999px;overflow:hidden;}\n.pf{height:100%;border-radius:999px;transition:width 0.6s ease;}\n\n\/* Section heading *\/\n.sh{font-size:10px;font-weight:700;color:var(--tm);letter-spacing:0.14em;\n  text-transform:uppercase;margin:20px 0 11px;\n  display:flex;align-items:center;gap:8px;}\n.sh::after{content:'';flex:1;height:1px;background:var(--b0);}\n\n\/* Empty *\/\n.empty{text-align:center;padding:44px 0;color:var(--td);font-size:14px;}\n.empty-ic{font-size:36px;margin-bottom:8px;display:block;}\n\n\/* Badge *\/\n.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.08em;\n  text-transform:uppercase;border-radius:6px;padding:3px 7px;}\n\n\/* Animate *\/\n@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}\n@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}\n@keyframes slideUp{from{transform:translateY(70px);opacity:0;}to{transform:translateY(0);opacity:1;}}\n.ani{animation:fadeUp 0.3s ease both;}\n\n\/* Modal *\/\n.mo{position:fixed;inset:0;background:rgba(0,0,0,0.88);\n  display:flex;align-items:flex-end;justify-content:center;\n  z-index:800;backdrop-filter:blur(10px);animation:fadeIn 0.18s ease;}\n.mo-sheet{\n  background:#0c0c1e;border-radius:26px 26px 0 0;width:100%;max-width:430px;\n  padding:26px 20px 44px;border:1px solid var(--b2);border-bottom:none;\n  animation:slideUp 0.26s cubic-bezier(0.32,0.72,0,1);\n  max-height:90vh;overflow-y:auto;\n}\n.mo-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}\n.mo-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gem2);}\n.mo-x{background:var(--s2);border:none;color:var(--tm);border-radius:10px;\n  width:34px;height:34px;cursor:pointer;font-size:16px;flex-shrink:0;}\n\n\/* Currency grid *\/\n.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}\n.cb{background:var(--s2);border:1px solid var(--b1);border-radius:12px;\n  padding:12px 6px;cursor:pointer;text-align:center;transition:all 0.15s;}\n.cb.on{background:rgba(155,127,232,0.12);border-color:var(--gem);}\n.cb-sym{font-size:17px;font-weight:700;display:block;}\n.cb-code{font-size:9px;color:var(--tm);margin-top:2px;display:block;}\n.cb.on .cb-code{color:var(--gem2);}\n\n\/* Ext type grid *\/\n.etg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:4px;}\n.etb{background:var(--s2);border:1px solid var(--b1);border-radius:12px;\n  padding:10px 6px;cursor:pointer;text-align:center;transition:all 0.15s;}\n.etb.on{background:rgba(155,127,232,0.12);border-color:var(--gem);}\n.etb-ic{font-size:18px;display:block;}\n.etb-nm{font-size:8.5px;color:var(--tm);margin-top:3px;display:block;line-height:1.3;}\n.etb.on .etb-nm{color:var(--gem2);}\n\n\/* Inline SVG gem *\/\n.gem-svg{display:inline-block;}\n\n\/* Home hero *\/\n.hero{\n  background:linear-gradient(155deg,#180a32 0%,#0c1426 50%,#091820 100%);\n  border-radius:24px;padding:24px 22px;margin-bottom:13px;\n  position:relative;overflow:hidden;border:1px solid rgba(155,127,232,0.12);\n}\n.hero::before{content:'';position:absolute;top:-50px;right:-50px;\n  width:200px;height:200px;border-radius:50%;\n  background:radial-gradient(circle,rgba(155,127,232,0.14) 0%,transparent 70%);pointer-events:none;}\n.hero::after{content:'';position:absolute;bottom:-40px;left:-30px;\n  width:160px;height:160px;border-radius:50%;\n  background:radial-gradient(circle,rgba(232,124,160,0.1) 0%,transparent 70%);pointer-events:none;}\n.quote{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;\n  color:rgba(255,255,255,0.4);line-height:1.55;margin-top:18px;}\n\n\/* Goal card *\/\n.gcrd{border-radius:22px;padding:18px;margin-bottom:11px;\n  position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.07);}\n.gcrd-bg{position:absolute;inset:0;pointer-events:none;border-radius:22px;}\n.days-pill{display:inline-flex;align-items:center;gap:4px;\n  background:rgba(255,255,255,0.07);border-radius:20px;\n  padding:3px 9px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:9px;}\n\n\/* Profile avatar *\/\n.ava-wrap{width:88px;height:88px;border-radius:50%;border:2.5px solid var(--gem);\n  overflow:hidden;cursor:pointer;position:relative;background:var(--s2);\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.ava-wrap img{width:100%;height:100%;object-fit:cover;}\n.ava-edit{position:absolute;inset:0;background:rgba(0,0,0,0.55);\n  display:flex;align-items:center;justify-content:center;\n  font-size:22px;opacity:0;transition:opacity 0.2s;}\n.ava-wrap:hover .ava-edit{opacity:1;}\n\n\/* Timeframe suggestion *\/\n.tf-sug{font-size:11px;padding:8px 12px;border-radius:10px;margin-top:4px;display:none;line-height:1.5;}\n\n\/* Deposit inline *\/\n.dep-row{display:flex;gap:8px;}\n.dep-in{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:10px;\n  padding:10px 12px;color:var(--text);font-size:14px;outline:none;}\n.dep-plus{background:var(--teal);border:none;border-radius:10px;\n  padding:10px 14px;color:#05050f;font-weight:700;cursor:pointer;font-size:16px;}\n.dep-x{background:var(--s2);border:none;border-radius:10px;\n  padding:10px 12px;color:var(--tm);cursor:pointer;}\n<\/style>\n<\/head>\n<body>\n\n<!-- ══════════════════════════════════════════\n     SPLASH\n══════════════════════════════════════════ -->\n<div id=\"splash\">\n  <div class=\"sp-gem\">\n    <svg width=\"96\" height=\"96\" viewBox=\"0 0 100 100\" fill=\"none\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\">\n      <defs>\n        <linearGradient id=\"g1\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"#c4abff\"\/><stop offset=\"100%\" stop-color=\"#9b7fe8\"\/><\/linearGradient>\n        <linearGradient id=\"g2\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"#e87ca0\"\/><stop offset=\"100%\" stop-color=\"#9b7fe8\"\/><\/linearGradient>\n        <linearGradient id=\"g3\" x1=\"100%\" y1=\"0%\" x2=\"0%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"#c4abff\" stop-opacity=\"0.85\"\/><stop offset=\"100%\" stop-color=\"#7c6af7\"\/><\/linearGradient>\n        <filter id=\"glow\"><feGaussianBlur stdDeviation=\"3.5\" result=\"b\"\/><feMerge><feMergeNode in=\"b\"\/><feMergeNode in=\"SourceGraphic\"\/><\/feMerge><\/filter>\n      <\/defs>\n      <path d=\"M50 8 L78 22 L92 50 L78 78 L50 92 L22 78 L8 50 L22 22 Z\" fill=\"url(#g1)\" opacity=\"0.12\" filter=\"url(#glow)\"\/>\n      <path d=\"M50 8 L78 22 L65 50 L50 8Z\" fill=\"url(#g3)\" opacity=\"0.95\"\/>\n      <path d=\"M78 22 L92 50 L65 50 L78 22Z\" fill=\"#9b7fe8\" opacity=\"0.75\"\/>\n      <path d=\"M92 50 L78 78 L65 50 L92 50Z\" fill=\"url(#g2)\" opacity=\"0.9\"\/>\n      <path d=\"M78 78 L50 92 L50 65 L78 78Z\" fill=\"#c4abff\" opacity=\"0.65\"\/>\n      <path d=\"M50 92 L22 78 L50 65 L50 92Z\" fill=\"url(#g1)\" opacity=\"0.85\"\/>\n      <path d=\"M22 78 L8 50 L35 50 L22 78Z\" fill=\"#e87ca0\" opacity=\"0.75\"\/>\n      <path d=\"M8 50 L22 22 L35 50 L8 50Z\" fill=\"url(#g3)\" opacity=\"0.9\"\/>\n      <path d=\"M22 22 L50 8 L50 35 L22 22Z\" fill=\"#9b7fe8\" opacity=\"0.95\"\/>\n      <path d=\"M50 35 L65 50 L50 65 L35 50Z\" fill=\"white\" opacity=\"0.16\"\/>\n      <line x1=\"50\" y1=\"8\" x2=\"50\" y2=\"35\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.35\"\/>\n      <line x1=\"78\" y1=\"22\" x2=\"65\" y2=\"50\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.35\"\/>\n      <line x1=\"92\" y1=\"50\" x2=\"65\" y2=\"50\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.35\"\/>\n      <line x1=\"50\" y1=\"92\" x2=\"50\" y2=\"65\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.35\"\/>\n      <line x1=\"8\" y1=\"50\" x2=\"35\" y2=\"50\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.35\"\/>\n      <circle cx=\"37\" cy=\"30\" r=\"4.5\" fill=\"white\" opacity=\"0.32\"\/>\n      <circle cx=\"33\" cy=\"26\" r=\"1.8\" fill=\"white\" opacity=\"0.6\"\/>\n    <\/svg>\n  <\/div>\n  <div class=\"sp-name\">GEODE<\/div>\n  <div class=\"sp-tag\">Your Financial Crystal<\/div>\n  <div class=\"sp-bar\"><div class=\"sp-fill\"><\/div><\/div>\n<\/div>\n\n<!-- ══════════════════════════════════════════\n     APP SHELL\n══════════════════════════════════════════ -->\n<div id=\"shell\">\n\n  <!-- ONBOARDING -->\n  <div id=\"pg-onboard\" class=\"page show\">\n    <div class=\"ob-wrap\">\n\n      <!-- Step 1 -->\n      <div class=\"ob-step show\" id=\"ob1\">\n        <div class=\"ob-dots\"><div class=\"ob-dot on\"><\/div><div class=\"ob-dot\"><\/div><div class=\"ob-dot\"><\/div><\/div>\n        <svg width=\"52\" height=\"52\" viewBox=\"0 0 100 100\" fill=\"none\" style=\"margin-bottom:22px\">\n          <path d=\"M50 8 L78 22 L65 50 L50 8Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M78 22 L92 50 L65 50 L78 22Z\" fill=\"#9b7fe8\" opacity=\"0.75\"\/>\n          <path d=\"M92 50 L78 78 L65 50 L92 50Z\" fill=\"#e87ca0\" opacity=\"0.9\"\/>\n          <path d=\"M78 78 L50 92 L50 65 L78 78Z\" fill=\"#c4abff\" opacity=\"0.65\"\/>\n          <path d=\"M50 92 L22 78 L50 65 L50 92Z\" fill=\"#9b7fe8\" opacity=\"0.85\"\/>\n          <path d=\"M22 78 L8 50 L35 50 L22 78Z\" fill=\"#e87ca0\" opacity=\"0.75\"\/>\n          <path d=\"M8 50 L22 22 L35 50 L8 50Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M22 22 L50 8 L50 35 L22 22Z\" fill=\"#9b7fe8\" opacity=\"0.95\"\/>\n          <path d=\"M50 35 L65 50 L50 65 L35 50Z\" fill=\"white\" opacity=\"0.18\"\/>\n          <circle cx=\"37\" cy=\"30\" r=\"4\" fill=\"white\" opacity=\"0.32\"\/>\n        <\/svg>\n        <div class=\"ob-eyebrow\">✦ Welcome to GEODE<\/div>\n        <div class=\"ob-h\">Your wealth,<br\/><em>beautifully<\/em> clear.<\/div>\n        <div class=\"ob-p\">GEODE brings all your finances into one brilliant view — goals, savings, investments, debts and spending — so you can grow with confidence.<\/div>\n        <div class=\"field\"><label>What's your name?<\/label><input id=\"ob-name\" class=\"fi\" placeholder=\"e.g. Gloria\" maxlength=\"30\"\/><\/div>\n        <button class=\"btn btn-p\" onclick=\"obGo(1)\">Get Started →<\/button>\n      <\/div>\n\n      <!-- Step 2 -->\n      <div class=\"ob-step\" id=\"ob2\">\n        <div class=\"ob-dots\"><div class=\"ob-dot\"><\/div><div class=\"ob-dot on\"><\/div><div class=\"ob-dot\"><\/div><\/div>\n        <div class=\"ob-eyebrow\">💰 Your Baseline<\/div>\n        <div class=\"ob-h\">Set your<br\/><em>foundation<\/em><\/div>\n        <div class=\"ob-p\">Choose your currency and monthly take-home income so GEODE can plan realistically for you.<\/div>\n        <div class=\"field\"><label>Currency<\/label>\n          <select id=\"ob-cur\" class=\"fi\">\n            <option value=\"GBP\">£ GBP — British Pound<\/option>\n            <option value=\"USD\">$ USD — US Dollar<\/option>\n            <option value=\"EUR\">€ EUR — Euro<\/option>\n            <option value=\"GHS\">₵ GHS — Ghanaian Cedi<\/option>\n            <option value=\"NGN\">₦ NGN — Nigerian Naira<\/option>\n            <option value=\"KES\">KSh KES — Kenyan Shilling<\/option>\n            <option value=\"ZAR\">R ZAR — South African Rand<\/option>\n            <option value=\"CAD\">C$ CAD — Canadian Dollar<\/option>\n            <option value=\"AUD\">A$ AUD — Australian Dollar<\/option>\n            <option value=\"JPY\">¥ JPY — Japanese Yen<\/option>\n            <option value=\"INR\">₹ INR — Indian Rupee<\/option>\n            <option value=\"BRL\">R$ BRL — Brazilian Real<\/option>\n          <\/select>\n        <\/div>\n        <div class=\"field\"><label>Monthly Take-Home Income<\/label><input type=\"number\" id=\"ob-inc\" class=\"fi\" placeholder=\"e.g. 3500\"\/><\/div>\n        <button class=\"btn btn-p\" onclick=\"obGo(2)\">Continue →<\/button>\n        <div style=\"height:10px\"><\/div>\n        <button class=\"btn btn-s\" onclick=\"obGo(2)\">Skip<\/button>\n      <\/div>\n\n      <!-- Step 3 -->\n      <div class=\"ob-step\" id=\"ob3\">\n        <div class=\"ob-dots\"><div class=\"ob-dot\"><\/div><div class=\"ob-dot\"><\/div><div class=\"ob-dot on\"><\/div><\/div>\n        <div class=\"ob-eyebrow\">🎯 Your Goals<\/div>\n        <div class=\"ob-h\">What are you<br\/><em>saving for?<\/em><\/div>\n        <div class=\"ob-p\">Add one or more savings goals. GEODE will suggest a realistic timeframe based on how much you can save each month.<\/div>\n        <div id=\"ob-goals\"><\/div>\n        <button class=\"btn btn-s\" style=\"margin-bottom:10px\" onclick=\"addObGoal()\">+ Add a Savings Goal<\/button>\n        <button class=\"btn btn-p\" onclick=\"obFinish()\">Start My Journey →<\/button>\n        <div style=\"height:10px\"><\/div>\n        <button class=\"btn btn-s\" onclick=\"obFinish()\">Skip for now<\/button>\n      <\/div>\n\n    <\/div>\n  <\/div>\n\n  <!-- MAIN APP -->\n  <div id=\"pg-main\" class=\"page\">\n\n    <div id=\"hdr\">\n      <div class=\"hdr-logo\" onclick=\"switchTab('home')\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 100 100\" fill=\"none\">\n          <path d=\"M50 8 L78 22 L65 50 L50 8Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M78 22 L92 50 L65 50 L78 22Z\" fill=\"#9b7fe8\" opacity=\"0.75\"\/>\n          <path d=\"M92 50 L78 78 L65 50 L92 50Z\" fill=\"#e87ca0\" opacity=\"0.9\"\/>\n          <path d=\"M78 78 L50 92 L50 65 L78 78Z\" fill=\"#c4abff\" opacity=\"0.65\"\/>\n          <path d=\"M50 92 L22 78 L50 65 L50 92Z\" fill=\"#9b7fe8\" opacity=\"0.85\"\/>\n          <path d=\"M22 78 L8 50 L35 50 L22 78Z\" fill=\"#e87ca0\" opacity=\"0.75\"\/>\n          <path d=\"M8 50 L22 22 L35 50 L8 50Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M22 22 L50 8 L50 35 L22 22Z\" fill=\"#9b7fe8\" opacity=\"0.95\"\/>\n          <path d=\"M50 35 L65 50 L50 65 L35 50Z\" fill=\"white\" opacity=\"0.18\"\/>\n        <\/svg>\n        <span class=\"hdr-wordmark\">GEODE<\/span>\n      <\/div>\n      <div class=\"hdr-right\">\n        <div class=\"hdr-pill\" id=\"cur-pill\" onclick=\"openCurModal()\">£ GBP<\/div>\n        <div class=\"hdr-pill accent\" id=\"inc-pill\" onclick=\"openIncModal()\">Set Income<\/div>\n      <\/div>\n    <\/div>\n\n    <div id=\"tab-body\" class=\"scroll\"><\/div>\n\n    <nav id=\"tabs\">\n      <button class=\"tb on\" data-t=\"home\" onclick=\"switchTab('home')\">\n        <span class=\"tb-ic\">◈<\/span><span class=\"tb-lb\">Home<\/span><span class=\"tb-pip\"><\/span>\n      <\/button>\n      <button class=\"tb\" data-t=\"goals\" onclick=\"switchTab('goals')\">\n        <span class=\"tb-ic\">🎯<\/span><span class=\"tb-lb\">Goals<\/span><span class=\"tb-pip\"><\/span>\n      <\/button>\n      <button class=\"tb\" data-t=\"money\" onclick=\"switchTab('money')\">\n        <span class=\"tb-ic\">💳<\/span><span class=\"tb-lb\">Money<\/span><span class=\"tb-pip\"><\/span>\n      <\/button>\n      <button class=\"tb\" data-t=\"invest\" onclick=\"switchTab('invest')\">\n        <span class=\"tb-ic\">📈<\/span><span class=\"tb-lb\">Invest<\/span><span class=\"tb-pip\"><\/span>\n      <\/button>\n      <button class=\"tb\" data-t=\"profile\" onclick=\"switchTab('profile')\">\n        <span class=\"tb-ic\">👤<\/span><span class=\"tb-lb\">Profile<\/span><span class=\"tb-pip\"><\/span>\n      <\/button>\n    <\/nav>\n\n  <\/div>\n<\/div><!-- \/shell -->\n\n<script>\n\/* ══════════════════════════════════════════\n   STATE & STORAGE\n══════════════════════════════════════════ *\/\nconst KEY='geode_v4';\nlet S={\n  done:false,\n  profile:{name:'',bio:'',photo:null},\n  currency:{code:'GBP',symbol:'£',name:'British Pound',locale:'en-GB'},\n  income:0,\n  goals:[],\n  debts:[],\n  payments:[],\n  expenses:[],\n  external:[]\n};\nconst CURR=[\n  {code:'GBP',symbol:'£',name:'British Pound',locale:'en-GB'},\n  {code:'USD',symbol:'$',name:'US Dollar',locale:'en-US'},\n  {code:'EUR',symbol:'€',name:'Euro',locale:'de-DE'},\n  {code:'GHS',symbol:'₵',name:'Ghanaian Cedi',locale:'en-GH'},\n  {code:'NGN',symbol:'₦',name:'Nigerian Naira',locale:'en-NG'},\n  {code:'KES',symbol:'KSh',name:'Kenyan Shilling',locale:'en-KE'},\n  {code:'ZAR',symbol:'R',name:'South African Rand',locale:'en-ZA'},\n  {code:'CAD',symbol:'C$',name:'Canadian Dollar',locale:'en-CA'},\n  {code:'AUD',symbol:'A$',name:'Australian Dollar',locale:'en-AU'},\n  {code:'JPY',symbol:'¥',name:'Japanese Yen',locale:'ja-JP'},\n  {code:'INR',symbol:'₹',name:'Indian Rupee',locale:'en-IN'},\n  {code:'BRL',symbol:'R$',name:'Brazilian Real',locale:'pt-BR'}\n];\nfunction load(){try{const d=localStorage.getItem(KEY);if(d)S={...S,...JSON.parse(d)};}catch(e){}}\nfunction save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}\nfunction uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}\n\n\/* ══════════════════════════════════════════\n   FORMAT HELPERS\n══════════════════════════════════════════ *\/\nfunction fmt(v){\n  const c=S.currency,n=Number(v)||0;\n  try{return new Intl.NumberFormat(c.locale,{style:'currency',currency:c.code,minimumFractionDigits:0,maximumFractionDigits:0}).format(n);}\n  catch(e){return c.symbol+n.toLocaleString();}\n}\nfunction fmtD(s){if(!s)return'';try{return new Date(s.includes('T')?s:s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s;}}\nfunction daysLeft(s){if(!s)return null;const d=new Date(s.includes('T')?s:s+'T00:00:00')-new Date();return Math.ceil(d\/86400000);}\nfunction monthsLeft(s){if(!s)return null;const d=new Date(s.includes('T')?s:s+'T00:00:00'),n=new Date();return Math.max(0,((d.getFullYear()-n.getFullYear())*12)+(d.getMonth()-n.getMonth()));}\nfunction mthsToDate(months){const d=new Date();d.setMonth(d.getMonth()+months);return d.toISOString().slice(0,7)+'-01';}\n\n\/* ══════════════════════════════════════════\n   QUOTES\n══════════════════════════════════════════ *\/\nconst QQ=[\"Do not save what is left after spending; instead spend what is left after saving.\",\"A journey of a thousand miles begins with a single step.\",\"Financial freedom is available to those who learn about it and work for it.\",\"The best time to plant a tree was 20 years ago. The second best time is now.\",\"Small steps every day lead to big changes.\",\"Wealth is not about having a lot of money — it's about having a lot of options.\",\"Every expert was once a beginner. Every pro was once an amateur.\",\"Discipline is the bridge between goals and accomplishment.\",\"It's not about how much you earn, but how much you keep.\"];\nconst todayQ=QQ[new Date().getDate()%QQ.length];\n\n\/* ══════════════════════════════════════════\n   TIMEFRAME SUGGESTION\n══════════════════════════════════════════ *\/\nfunction tfSuggest(amount,monthly){\n  if(!monthly||monthly<=0)return null;\n  const m=Math.ceil(amount\/monthly);\n  return{months:m,date:mthsToDate(m)};\n}\nfunction tfWarn(months){\n  if(months<=3)return{txt:'Very ambitious — make sure you can commit!',col:'var(--amber)'};\n  if(months<=12)return{txt:'Achievable within a year — great goal!',col:'var(--teal)'};\n  if(months<=36)return{txt:'Solid medium-term plan — stay consistent.',col:'var(--teal)'};\n  if(months<=60)return{txt:'Long-term — consider automating savings.',col:'var(--gem2)'};\n  return{txt:'Very long-term — break it into milestones.',col:'var(--blue)'};\n}\n\n\/* ══════════════════════════════════════════\n   SPLASH → APP\n══════════════════════════════════════════ *\/\nload();\n\/\/ Hide splash after animation completes (bar takes ~2.7s total)\nsetTimeout(()=>{\n  document.getElementById('splash').classList.add('hide');\n  document.getElementById('shell').style.visibility='visible';\n  if(S.done) launchMain();\n},2900);\n\n\/* ══════════════════════════════════════════\n   ONBOARDING\n══════════════════════════════════════════ *\/\nlet obN=0;\nfunction obGo(from){\n  if(from===1){\n    const nm=document.getElementById('ob-name').value.trim();\n    if(nm)S.profile.name=nm;\n    save();\n  }\n  if(from===2){\n    const code=document.getElementById('ob-cur').value;\n    const c=CURR.find(x=>x.code===code)||CURR[0];\n    S.currency=c;\n    const inc=parseFloat(document.getElementById('ob-inc').value);\n    if(!isNaN(inc)&&inc>0)S.income=inc;\n    save();\n  }\n  document.getElementById(\`ob${from}\`).classList.remove('show');\n  document.getElementById(\`ob${from+1}\`).classList.add('show');\n}\n\nfunction addObGoal(){\n  obN++;\n  const id='og'+obN;\n  const d=document.createElement('div');\n  d.id=id;\n  d.style.cssText='background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:16px;margin-bottom:12px;';\n  d.innerHTML=\`\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;\">\n      <span style=\"font-size:12px;font-weight:700;color:var(--gem2);\">Goal ${obN}<\/span>\n      <button onclick=\"this.closest('div[id]').remove()\" class=\"btn-d\">Remove<\/button>\n    <\/div>\n    <div class=\"field\"><label>Goal Name<\/label><input class=\"fi og-n\" placeholder=\"e.g. Holiday, Emergency Fund, House Deposit\"\/><\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Target Amount<\/label><input type=\"number\" class=\"fi og-a\" placeholder=\"5000\" oninput=\"obSuggest('${id}')\"\/><\/div>\n      <div class=\"field\"><label>Already Saved<\/label><input type=\"number\" class=\"fi og-s\" placeholder=\"0\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Monthly Saving for This Goal<\/label><input type=\"number\" class=\"fi og-m\" placeholder=\"200\" oninput=\"obSuggest('${id}')\"\/><\/div>\n    <div class=\"field\"><label>Target Date<\/label><input type=\"month\" class=\"fi og-d\"\/><\/div>\n    <div class=\"tf-sug\" id=\"${id}-sug\"><\/div>\`;\n  document.getElementById('ob-goals').appendChild(d);\n}\nfunction obSuggest(id){\n  const el=document.getElementById(id);\n  const a=parseFloat(el.querySelector('.og-a').value)||0;\n  const m=parseFloat(el.querySelector('.og-m').value)||0;\n  const sug=document.getElementById(\`${id}-sug\`);\n  if(a>0&&m>0){\n    const tf=tfSuggest(a,m);\n    if(tf){\n      const w=tfWarn(tf.months);\n      sug.style.display='block';\n      sug.style.color=w.col;\n      sug.style.background=\`color-mix(in srgb,${w.col} 10%,transparent)\`;\n      sug.innerHTML=\`💡 At ${fmt(m)}\/month → <strong>${tf.months} month${tf.months!==1?'s':''}<\/strong>. ${w.txt}\`;\n      el.querySelector('.og-d').value=tf.date.slice(0,7);\n    }\n  } else { sug.style.display='none'; }\n}\nfunction obFinish(){\n  document.querySelectorAll('[id^=\"og\"]').forEach(el=>{\n    const nm=el.querySelector('.og-n')?.value.trim();\n    const am=parseFloat(el.querySelector('.og-a')?.value)||0;\n    if(nm&&am>0){\n      const sv=parseFloat(el.querySelector('.og-s')?.value)||0;\n      const mo=parseFloat(el.querySelector('.og-m')?.value)||0;\n      const dv=el.querySelector('.og-d')?.value;\n      S.goals.push({id:uid(),name:nm,amount:am,saved:sv,monthly:mo,targetDate:dv?(dv+'-01'):null,category:'general',color:randColor()});\n    }\n  });\n  S.done=true; save(); launchMain();\n}\nfunction randColor(){\n  return['var(--gem)','var(--rose)','var(--teal)','var(--amber)','var(--blue)'][Math.floor(Math.random()*5)];\n}\nfunction launchMain(){\n  document.getElementById('pg-onboard').classList.remove('show');\n  document.getElementById('pg-main').classList.add('show');\n  syncPills(); switchTab('home');\n}\n\n\/* ══════════════════════════════════════════\n   MODALS\n══════════════════════════════════════════ *\/\nfunction openMo(html){\n  closeMo();\n  const el=document.createElement('div');\n  el.className='mo';el.id='mo';\n  el.innerHTML=\`<div class=\"mo-sheet\">${html}<\/div>\`;\n  el.addEventListener('click',e=>{if(e.target===el)closeMo();});\n  document.body.appendChild(el);\n}\nfunction closeMo(){document.getElementById('mo')?.remove();}\nfunction moH(title){return\`<div class=\"mo-hdr\"><span class=\"mo-title\">${title}<\/span><button class=\"mo-x\" onclick=\"closeMo()\">✕<\/button><\/div>\`;}\n\n\/* ══════════════════════════════════════════\n   CURRENCY \/ INCOME\n══════════════════════════════════════════ *\/\nfunction syncPills(){\n  document.getElementById('cur-pill').textContent=\`${S.currency.symbol} ${S.currency.code}\`;\n  document.getElementById('inc-pill').textContent=S.income>0?fmt(S.income):'Set Income';\n}\nfunction openCurModal(){\n  openMo(moH('Currency')+\`<div class=\"cg\">${CURR.map(c=>\`<div class=\"cb ${c.code===S.currency.code?'on':''}\" onclick=\"setCur('${c.code}')\"><span class=\"cb-sym\">${c.symbol}<\/span><span class=\"cb-code\">${c.code}<\/span><\/div>\`).join('')}<\/div>\`);\n}\nfunction setCur(code){\n  const c=CURR.find(x=>x.code===code);if(c){S.currency=c;save();closeMo();syncPills();renderTab();}\n}\nfunction openIncModal(){\n  openMo(moH('Monthly Income')+\`<div class=\"field\"><label>Amount (${S.currency.code})<\/label><input type=\"number\" id=\"mi\" class=\"fi\" value=\"${S.income||''}\" placeholder=\"3500\" style=\"font-size:26px;font-family:'Cormorant Garamond',serif;font-weight:700;\"\/><\/div><button class=\"btn btn-p\" onclick=\"saveInc()\">Save<\/button>\`);\n  setTimeout(()=>document.getElementById('mi')?.focus(),80);\n}\nfunction saveInc(){\n  const v=parseFloat(document.getElementById('mi').value);\n  if(!isNaN(v)&&v>=0){S.income=v;save();closeMo();syncPills();if(cur==='home')renderTab();}\n}\n\n\/* ══════════════════════════════════════════\n   TAB ROUTER\n══════════════════════════════════════════ *\/\nlet cur='home';\nconst RENDERS={home:rHome,goals:rGoals,money:rMoney,invest:rInvest,profile:rProfile};\nfunction switchTab(t){\n  cur=t;\n  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.t===t));\n  renderTab();\n}\nfunction renderTab(){RENDERS[cur]?.();}\n\n\/* ══════════════════════════════════════════\n   HOME TAB\n══════════════════════════════════════════ *\/\nfunction rHome(){\n  const el=document.getElementById('tab-body');\n  const tDebt=S.debts.reduce((s,d)=>s+Number(d.balance),0);\n  const tGoalSaved=S.goals.reduce((s,g)=>s+Number(g.saved),0);\n  const tGoalTarget=S.goals.reduce((s,g)=>s+Number(g.amount),0);\n  const tExt=S.external.reduce((s,e)=>s+Number(e.balance),0);\n  const tSaved=tGoalSaved+tExt;\n  const tUp=S.payments.filter(p=>p.status==='upcoming').reduce((s,p)=>s+Number(p.amount),0);\n  const tExp=S.expenses.reduce((s,e)=>s+Number(e.amount),0);\n  const left=Number(S.income)-tUp-tExp;\n  const netW=tSaved-tDebt;\n  const nm=S.profile.name?\`Hi, ${S.profile.name.split(' ')[0]} 👋\`:'Welcome to GEODE ✦';\n  el.innerHTML=\`\n    <div class=\"hero\">\n      <div style=\"font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);margin-bottom:3px;\">${nm}<\/div>\n      <div style=\"font-size:9px;color:var(--gem2);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:8px;font-weight:700;\">Net Worth<\/div>\n      <div class=\"n-big\" style=\"color:${netW>=0?'var(--teal)':'var(--red)'};\">${fmt(netW)}<\/div>\n      <div style=\"font-size:11px;color:rgba(255,255,255,0.28);margin-top:5px;\">total assets minus liabilities<\/div>\n      <div class=\"quote\">\"${todayQ}\"<\/div>\n    <\/div>\n\n    <div class=\"g2\">\n      <div class=\"tile\" style=\"border-color:rgba(52,213,160,0.12);\">\n        <div class=\"tile-lbl\">Total Saved<\/div>\n        <div class=\"n-med\" style=\"color:var(--teal);\">${fmt(tSaved)}<\/div>\n        ${tGoalTarget>0?\`<div style=\"margin-top:8px\"><div class=\"pt\" style=\"height:4px\"><div class=\"pf\" style=\"width:${Math.min(100,(tGoalSaved\/tGoalTarget)*100).toFixed(0)}%;background:var(--teal);\"><\/div><\/div><div style=\"font-size:9px;color:var(--tm);margin-top:3px;\">${Math.min(100,(tGoalSaved\/tGoalTarget)*100).toFixed(0)}% of goals<\/div><\/div>\`:''}\n      <\/div>\n      <div class=\"tile\" style=\"border-color:rgba(240,112,112,0.12);\">\n        <div class=\"tile-lbl\">Total Debt<\/div>\n        <div class=\"n-med\" style=\"color:var(--red);\">${fmt(tDebt)}<\/div>\n      <\/div>\n      <div class=\"tile\" style=\"border-color:rgba(245,194,52,0.12);\">\n        <div class=\"tile-lbl\">Monthly Left<\/div>\n        <div class=\"n-med\" style=\"color:${left>=0?'var(--amber)':'var(--red)'};\">${fmt(left)}<\/div>\n      <\/div>\n      <div class=\"tile\" style=\"border-color:rgba(155,127,232,0.12);\">\n        <div class=\"tile-lbl\">Investments<\/div>\n        <div class=\"n-med\" style=\"color:var(--gem2);\">${fmt(tExt)}<\/div>\n      <\/div>\n    <\/div>\n\n    ${S.goals.length>0?\`\n    <div class=\"sh\">Savings Goals<\/div>\n    ${S.goals.slice(0,3).map(g=>{\n      const p=g.amount>0?Math.min(100,(Number(g.saved)\/Number(g.amount))*100):0;\n      const dl=daysLeft(g.targetDate), ml=monthsLeft(g.targetDate), col=g.color||'var(--gem)';\n      return\`<div class=\"gcrd\" style=\"background:linear-gradient(135deg,color-mix(in srgb,${col} 8%,var(--s1)) 0%,var(--s1) 100%);\">\n        ${dl!==null?\`<div class=\"days-pill\">${dl>0?\`${dl} days left\`:dl===0?'Due today!':'Overdue'}<\/div>\`:''}\n        <div style=\"font-size:15px;font-weight:700;margin-bottom:4px;\">${g.name}<\/div>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;\">\n          <span class=\"n-sm\" style=\"color:${col};\">${fmt(g.saved)}<\/span>\n          <span style=\"font-size:11px;color:var(--tm);\">of ${fmt(g.amount)}<\/span>\n        <\/div>\n        <div class=\"pt\" style=\"height:6px\"><div class=\"pf\" style=\"width:${p.toFixed(0)}%;background:${col};\"><\/div><\/div>\n        <div style=\"font-size:10px;color:var(--tm);margin-top:5px;\">${p.toFixed(0)}%${ml?\` · ${ml} months remaining\`:''}<\/div>\n      <\/div>\`;\n    }).join('')}\n    ${S.goals.length>3?\`<button class=\"btn-g\" style=\"width:100%;text-align:center;margin-bottom:4px;\" onclick=\"switchTab('goals')\">View all ${S.goals.length} goals →<\/button>\`:''}\n    \`:''}\n\n    <div class=\"sh\">Quick Actions<\/div>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;padding-bottom:4px;\">\n      <button class=\"btn-export\" onclick=\"doExcel()\">📊 Export Excel<\/button>\n      <button class=\"btn-export\" style=\"background:rgba(155,127,232,0.1);border-color:rgba(155,127,232,0.22);color:var(--gem2);\" onclick=\"openCurModal()\">💱 Currency<\/button>\n      <button class=\"btn-export\" style=\"background:rgba(52,213,160,0.1);border-color:rgba(52,213,160,0.22);color:var(--teal);\" onclick=\"switchTab('goals')\">🎯 New Goal<\/button>\n      <button class=\"btn-export\" style=\"background:rgba(240,112,112,0.1);border-color:rgba(240,112,112,0.22);color:var(--red);\" onclick=\"switchTab('money');setTimeout(()=>openDebtMo(),100)\">+ Add Debt<\/button>\n    <\/div>\n    <div style=\"height:6px\"><\/div>\n  \`;\n}\n\n\/* ══════════════════════════════════════════\n   GOALS TAB\n══════════════════════════════════════════ *\/\nconst GC={holiday:{lb:'Holiday',em:'✈️'},emergency:{lb:'Emergency Fund',em:'🆘'},home:{lb:'Home \/ Property',em:'🏠'},car:{lb:'New Car',em:'🚗'},education:{lb:'Education',em:'🎓'},wedding:{lb:'Wedding \/ Event',em:'💍'},business:{lb:'Business',em:'💼'},retirement:{lb:'Retirement',em:'🧓'},gadget:{lb:'Tech \/ Gadget',em:'📱'},other:{lb:'Other',em:'💰'}};\n\nfunction rGoals(){\n  const el=document.getElementById('tab-body');\n  const tT=S.goals.reduce((s,g)=>s+Number(g.amount),0);\n  const tS=S.goals.reduce((s,g)=>s+Number(g.saved),0);\n  el.innerHTML=\`\n    <button class=\"btn btn-p\" onclick=\"openGoalMo()\">+ New Savings Goal<\/button>\n    ${S.goals.length>0?\`\n    <div class=\"card\" style=\"margin-top:13px;background:linear-gradient(135deg,#0e0a20,#0a0e1c);border-color:rgba(155,127,232,0.14);\">\n      <div class=\"card-lbl\">All Goals Combined<\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;\">\n        <span class=\"n-med\" style=\"color:var(--teal);\">${fmt(tS)}<\/span>\n        <span style=\"font-size:11px;color:var(--tm);\">target ${fmt(tT)}<\/span>\n      <\/div>\n      <div class=\"pt\" style=\"height:6px\"><div class=\"pf\" style=\"width:${tT>0?Math.min(100,(tS\/tT)*100).toFixed(0):0}%;background:linear-gradient(90deg,var(--gem),var(--teal));\"><\/div><\/div>\n    <\/div>\`:''}\n    <div id=\"goals-list\" style=\"margin-top:4px;\"><\/div>\`;\n  const list=document.getElementById('goals-list');\n  if(!S.goals.length){list.innerHTML=\`<div class=\"empty\"><span class=\"empty-ic\">🎯<\/span>No goals yet<br\/><span style=\"font-size:12px\">Tap above to add your first<\/span><\/div>\`;return;}\n  S.goals.forEach((g,i)=>{\n    const p=g.amount>0?Math.min(100,(Number(g.saved)\/Number(g.amount))*100):0;\n    const dl=daysLeft(g.targetDate), ml=monthsLeft(g.targetDate);\n    const rem=Math.max(0,Number(g.amount)-Number(g.saved));\n    const col=g.color||'var(--gem)';\n    const cat=GC[g.category]||GC.other;\n    const d=document.createElement('div');d.className='card ani';d.style.animationDelay=\`${i*0.04}s\`;d.style.borderLeft=\`3px solid ${col}\`;\n    d.innerHTML=\`\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;\">\n        <div><div style=\"font-size:15px;font-weight:700;\">${cat.em} ${g.name}<\/div>\n          <div style=\"font-size:10px;color:var(--tm);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;\">${cat.lb}<\/div>\n          ${g.targetDate?\`<div style=\"font-size:10px;color:${dl!==null&&dl<30?'var(--amber)':'var(--td)'};margin-top:2px;\">📅 ${fmtD(g.targetDate)}${dl!==null?\` (${dl>0?dl+' days':dl===0?'Today!':'Overdue'})\`:''}<\/div>\`:''}\n        <\/div>\n        <button class=\"btn-d\" onclick=\"removeGoal('${g.id}')\">Remove<\/button>\n      <\/div>\n      <div class=\"pt\" style=\"height:7px;margin-bottom:8px\"><div class=\"pf\" style=\"width:${p.toFixed(0)}%;background:${col};\"><\/div><\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;\">\n        <span class=\"n-sm\" style=\"color:${col};\">${fmt(g.saved)}<\/span>\n        <span style=\"font-size:10px;color:var(--tm);\">${p.toFixed(0)}%${ml?\` · ${ml}mo left\`:''}<\/span>\n        <span style=\"font-size:13px;color:var(--td);\">${fmt(g.amount)}<\/span>\n      <\/div>\n      ${Number(g.monthly)>0?\`<div style=\"font-size:11px;color:var(--tm);margin-bottom:10px;\">Saving ${fmt(g.monthly)}\/month · ${fmt(rem)} to go<\/div>\`:''}\n      <div id=\"dep-${g.id}\"><button class=\"btn-ok\" onclick=\"showDep('${g.id}')\">+ Add Funds<\/button><\/div>\`;\n    list.appendChild(d);\n  });\n}\nfunction openGoalMo(){\n  openMo(moH('New Savings Goal')+\`\n    <div class=\"field\"><label>Goal Name<\/label><input id=\"gn\" class=\"fi\" placeholder=\"Holiday, House Deposit, Car…\"\/><\/div>\n    <div class=\"field\"><label>Category<\/label><select id=\"gc\" class=\"fi\">${Object.entries(GC).map(([v,o])=>\`<option value=\"${v}\">${o.em} ${o.lb}<\/option>\`).join('')}<\/select><\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Target (${S.currency.code})<\/label><input type=\"number\" id=\"ga\" class=\"fi\" placeholder=\"5000\" oninput=\"liveGoalSug()\"\/><\/div>\n      <div class=\"field\"><label>Already Saved<\/label><input type=\"number\" id=\"gs\" class=\"fi\" placeholder=\"0\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Monthly Saving for This Goal<\/label><input type=\"number\" id=\"gm\" class=\"fi\" placeholder=\"200\" oninput=\"liveGoalSug()\"\/><\/div>\n    <div class=\"field\"><label>Target Date<\/label><input type=\"month\" id=\"gd\" class=\"fi\"\/>\n      <div class=\"tf-sug\" id=\"g-sug\"><\/div><\/div>\n    <button class=\"btn btn-p\" style=\"margin-top:4px;\" onclick=\"saveGoal()\">Save Goal<\/button>\`);\n}\nfunction liveGoalSug(){\n  const a=parseFloat(document.getElementById('ga')?.value)||0;\n  const m=parseFloat(document.getElementById('gm')?.value)||0;\n  const sug=document.getElementById('g-sug');if(!sug)return;\n  if(a>0&&m>0){\n    const tf=tfSuggest(a,m);if(!tf)return;\n    const w=tfWarn(tf.months);\n    sug.style.display='block';sug.style.color=w.col;\n    sug.style.background=\`color-mix(in srgb,${w.col} 10%,transparent)\`;\n    sug.innerHTML=\`💡 At ${fmt(m)}\/month → <strong>${tf.months} month${tf.months!==1?'s':''}<\/strong>. ${w.txt}\`;\n    document.getElementById('gd').value=tf.date.slice(0,7);\n  } else {sug.style.display='none';}\n}\nfunction saveGoal(){\n  const nm=document.getElementById('gn').value.trim(),am=document.getElementById('ga').value;\n  if(!nm||!am)return;\n  const dv=document.getElementById('gd').value;\n  S.goals.push({id:uid(),name:nm,amount:Number(am),saved:Number(document.getElementById('gs').value)||0,monthly:Number(document.getElementById('gm').value)||0,targetDate:dv?(dv+'-01'):null,category:document.getElementById('gc').value,color:randColor()});\n  save();closeMo();rGoals();\n}\nfunction removeGoal(id){if(confirm('Remove this goal?')){S.goals=S.goals.filter(g=>g.id!==id);save();rGoals();}}\nfunction showDep(id){\n  const a=document.getElementById(\`dep-${id}\`);\n  a.innerHTML=\`<div class=\"dep-row\"><input class=\"dep-in\" id=\"di-${id}\" type=\"number\" placeholder=\"Amount\"\/><button class=\"dep-plus\" onclick=\"doDep('${id}')\">+<\/button><button class=\"dep-x\" onclick=\"cancelDep('${id}')\">✕<\/button><\/div>\`;\n  setTimeout(()=>document.getElementById(\`di-${id}\`)?.focus(),40);\n}\nfunction doDep(id){\n  const v=parseFloat(document.getElementById(\`di-${id}\`)?.value);\n  if(!isNaN(v)&&v>0){const g=S.goals.find(x=>x.id===id);if(g){g.saved=Number(g.saved)+v;save();rGoals();}}\n}\nfunction cancelDep(id){const a=document.getElementById(\`dep-${id}\`);if(a)a.innerHTML=\`<button class=\"btn-ok\" onclick=\"showDep('${id}')\">+ Add Funds<\/button>\`;}\n\n\/* ══════════════════════════════════════════\n   MONEY TAB (Debts | Payments | Expenses — separate sub-tabs)\n══════════════════════════════════════════ *\/\nconst DC={credit_card:{lb:'Credit Card',col:'var(--red)',em:'💳'},loan:{lb:'Personal Loan',col:'var(--amber)',em:'🏦'},mortgage:{lb:'Mortgage',col:'var(--blue)',em:'🏠'},student:{lb:'Student Loan',col:'var(--gem2)',em:'🎓'},car:{lb:'Car Loan',col:'var(--teal)',em:'🚗'},other:{lb:'Other',col:'var(--tm)',em:'📋'}};\nconst EC={food:{lb:'Food & Dining',col:'var(--amber)',em:'🍔'},transport:{lb:'Transport',col:'var(--teal)',em:'🚗'},utilities:{lb:'Utilities',col:'var(--gem2)',em:'💡'},entertainment:{lb:'Entertainment',col:'var(--rose)',em:'🎬'},health:{lb:'Health',col:'var(--red)',em:'🏥'},shopping:{lb:'Shopping',col:'var(--blue)',em:'🛍️'},subscriptions:{lb:'Subscriptions',col:'var(--teal)',em:'📱'},other:{lb:'Other',col:'var(--tm)',em:'📦'}};\nlet mSub='debts';\n\nfunction rMoney(){\n  const el=document.getElementById('tab-body');\n  const tDebt=S.debts.reduce((s,d)=>s+Number(d.balance),0);\n  const tUp=S.payments.filter(p=>p.status==='upcoming').reduce((s,p)=>s+Number(p.amount),0);\n  const tExp=S.expenses.reduce((s,e)=>s+Number(e.amount),0);\n  const left=Number(S.income)-tUp-tExp;\n  el.innerHTML=\`\n    <div class=\"g2\" style=\"margin-bottom:10px;\">\n      <div class=\"tile\" style=\"border-color:rgba(240,112,112,0.12);\">\n        <div class=\"tile-lbl\">Total Debt<\/div>\n        <div class=\"n-med\" style=\"color:var(--red);\">${fmt(tDebt)}<\/div>\n      <\/div>\n      <div class=\"tile\" style=\"border-color:rgba(${left>=0?'245,194,52':'240,112,112'},0.12);\">\n        <div class=\"tile-lbl\">Monthly Left<\/div>\n        <div class=\"n-med\" style=\"color:${left>=0?'var(--amber)':'var(--red)'};\">${fmt(left)}<\/div>\n      <\/div>\n    <\/div>\n\n    <!-- Sub-tab pills -->\n    <div style=\"display:flex;gap:7px;margin-bottom:16px;\">\n      ${[['debts','💳 Debts'],['payments','📅 Payments'],['expenses','🧾 Expenses']].map(([k,lb])=>\`\n        <button onclick=\"mSub='${k}';rMoneySub()\" style=\"flex:1;background:${mSub===k?'var(--gem)':'var(--s2)'};border:1px solid ${mSub===k?'var(--gem)':'var(--b1)'};border-radius:10px;padding:8px 4px;font-size:10px;font-weight:700;color:${mSub===k?'#fff':'var(--tm)'};cursor:pointer;letter-spacing:0.04em;\">${lb}<\/button>\`).join('')}\n    <\/div>\n    <div id=\"money-sub\"><\/div>\`;\n  rMoneySub();\n}\nfunction rMoneySub(){\n  \/\/ Re-render sub-tab pills highlight without full re-render\n  document.querySelectorAll('#tab-body button[onclick*=\"mSub\"]').forEach(b=>{\n    const k=b.getAttribute('onclick').match(\/'(\\w+)'\/)[1];\n    const on=k===mSub;\n    b.style.background=on?'var(--gem)':'var(--s2)';\n    b.style.borderColor=on?'var(--gem)':'var(--b1)';\n    b.style.color=on?'#fff':'var(--tm)';\n  });\n  const sub=document.getElementById('money-sub');if(!sub)return;\n  if(mSub==='debts') rDebts(sub);\n  if(mSub==='payments') rPayments(sub);\n  if(mSub==='expenses') rExpenses(sub);\n}\n\n\/* — DEBTS — *\/\nfunction rDebts(sub){\n  sub.innerHTML=\`<button class=\"btn btn-p\" id=\"addDebtBtn\" onclick=\"openDebtMo()\">+ Add Debt<\/button><div id=\"dl\" style=\"margin-top:12px;\"><\/div>\`;\n  const list=document.getElementById('dl');\n  if(!S.debts.length){list.innerHTML=\`<div class=\"empty\"><span class=\"empty-ic\">🎉<\/span>No debts recorded<\/div>\`;return;}\n  S.debts.forEach((d,i)=>{\n    const cat=DC[d.category]||DC.other;\n    const el=document.createElement('div');el.className='card ani';el.style.animationDelay=\`${i*0.04}s\`;el.style.borderLeft=\`3px solid ${cat.col}\`;\n    el.innerHTML=\`<div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;\">\n      <div><div style=\"font-size:15px;font-weight:700;\">${d.name}<\/div><div style=\"font-size:10px;color:${cat.col};margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;\">${cat.em} ${cat.lb}<\/div><\/div>\n      <button class=\"btn-d\" onclick=\"removeDebt('${d.id}')\">Remove<\/button>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;\">\n      <div><div style=\"font-size:9px;color:var(--tm);text-transform:uppercase;margin-bottom:2px;\">Balance<\/div><div class=\"n-sm\" style=\"color:${cat.col};\">${fmt(d.balance)}<\/div><\/div>\n      ${d.interest?\`<div><div style=\"font-size:9px;color:var(--tm);text-transform:uppercase;margin-bottom:2px;\">APR<\/div><div class=\"n-sm\" style=\"color:var(--amber);\">${d.interest}%<\/div><\/div>\`:'<div><\/div>'}\n      ${d.minPayment?\`<div><div style=\"font-size:9px;color:var(--tm);text-transform:uppercase;margin-bottom:2px;\">Min\/Mo<\/div><div class=\"n-sm\" style=\"color:var(--tm);\">${fmt(d.minPayment)}<\/div><\/div>\`:'<div><\/div>'}\n    <\/div>\`;\n    list.appendChild(el);\n  });\n}\nfunction openDebtMo(){\n  openMo(moH('Add Debt')+\`\n    <div class=\"field\"><label>Name<\/label><input id=\"dn\" class=\"fi\" placeholder=\"Visa Card, Student Loan…\"\/><\/div>\n    <div class=\"field\"><label>Category<\/label><select id=\"dc\" class=\"fi\">${Object.entries(DC).map(([v,o])=>\`<option value=\"${v}\">${o.em} ${o.lb}<\/option>\`).join('')}<\/select><\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Balance<\/label><input type=\"number\" id=\"db\" class=\"fi\" placeholder=\"5000\"\/><\/div>\n      <div class=\"field\"><label>APR %<\/label><input type=\"number\" id=\"di\" class=\"fi\" placeholder=\"24.9\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Min Monthly Payment<\/label><input type=\"number\" id=\"dm\" class=\"fi\" placeholder=\"150\"\/><\/div>\n    <button class=\"btn btn-p\" onclick=\"saveDebt()\">Save Debt<\/button>\`);\n}\nfunction saveDebt(){\n  const nm=document.getElementById('dn').value.trim(),bal=document.getElementById('db').value;\n  if(!nm||!bal)return;\n  S.debts.push({id:uid(),name:nm,category:document.getElementById('dc').value,balance:Number(bal),interest:document.getElementById('di').value,minPayment:document.getElementById('dm').value});\n  save();closeMo();rMoney();\n}\nfunction removeDebt(id){S.debts=S.debts.filter(d=>d.id!==id);save();rMoney();}\n\n\/* — PAYMENTS — *\/\nfunction rPayments(sub){\n  const sorted=[...S.payments].sort((a,b)=>a.dueDate&&b.dueDate?new Date(a.dueDate)-new Date(b.dueDate):0);\n  const tUp=sorted.filter(p=>p.status==='upcoming').reduce((s,p)=>s+Number(p.amount),0);\n  sub.innerHTML=\`\n    <button class=\"btn btn-p\" onclick=\"openPayMo()\">+ Schedule Payment<\/button>\n    ${sorted.filter(p=>p.status==='upcoming').length>0?\`<div style=\"display:flex;justify-content:space-between;align-items:center;margin:12px 0 4px;\"><span style=\"font-size:11px;color:var(--tm);\">${sorted.filter(p=>p.status==='upcoming').length} upcoming<\/span><span class=\"n-sm\" style=\"color:var(--amber);\">${fmt(tUp)}<\/span><\/div>\`:''}\n    <div id=\"pl\" style=\"margin-top:8px;\"><\/div>\`;\n  const list=document.getElementById('pl');\n  if(!sorted.length){list.innerHTML=\`<div class=\"empty\"><span class=\"empty-ic\">📅<\/span>No payments scheduled<\/div>\`;return;}\n  const SC={upcoming:'var(--amber)',paid:'var(--teal)',overdue:'var(--red)'};\n  sorted.forEach((p,i)=>{\n    const col=SC[p.status]||'var(--tm)';\n    const d=document.createElement('div');d.className='card ani';d.style.animationDelay=\`${i*0.04}s\`;d.style.borderLeft=\`3px solid ${col}\`;if(p.status==='paid')d.style.opacity='0.55';\n    d.innerHTML=\`<div style=\"display:flex;justify-content:space-between;align-items:center;\">\n      <div><div style=\"font-size:14px;font-weight:600;${p.status==='paid'?'text-decoration:line-through;color:var(--tm);':''}\">${p.name}<\/div>${p.dueDate?\`<div style=\"font-size:11px;color:var(--tm);\">Due ${fmtD(p.dueDate)}<\/div>\`:''}<\/div>\n      <div style=\"text-align:right;\"><div class=\"n-sm\" style=\"color:${col};\">${fmt(p.amount)}<\/div>\n        <div style=\"display:flex;gap:5px;margin-top:5px;justify-content:flex-end;\">\n          <button class=\"btn-g\" style=\"font-size:11px;color:${p.status==='paid'?'var(--tm)':'var(--teal)'};\" onclick=\"togglePay('${p.id}')\">${p.status==='paid'?'↩':'✓'}<\/button>\n          <button class=\"btn-d\" onclick=\"removePay('${p.id}')\">✕<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\`;\n    list.appendChild(d);\n  });\n}\nfunction openPayMo(){\n  openMo(moH('Schedule Payment')+\`\n    <div class=\"field\"><label>Name<\/label><input id=\"pn\" class=\"fi\" placeholder=\"Rent, Credit Card, Subscription…\"\/><\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Amount<\/label><input type=\"number\" id=\"pa\" class=\"fi\" placeholder=\"1200\"\/><\/div>\n      <div class=\"field\"><label>Due Date<\/label><input type=\"date\" id=\"pd\" class=\"fi\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Status<\/label><select id=\"ps\" class=\"fi\"><option value=\"upcoming\">Upcoming<\/option><option value=\"paid\">Already Paid<\/option><option value=\"overdue\">Overdue<\/option><\/select><\/div>\n    <button class=\"btn btn-p\" onclick=\"savePay()\">Save<\/button>\`);\n}\nfunction savePay(){\n  const nm=document.getElementById('pn').value.trim(),am=document.getElementById('pa').value;\n  if(!nm||!am)return;\n  S.payments.push({id:uid(),name:nm,amount:Number(am),dueDate:document.getElementById('pd').value,status:document.getElementById('ps').value});\n  save();closeMo();rMoney();\n}\nfunction togglePay(id){const p=S.payments.find(x=>x.id===id);if(p){p.status=p.status==='paid'?'upcoming':'paid';save();rMoney();}}\nfunction removePay(id){S.payments=S.payments.filter(p=>p.id!==id);save();rMoney();}\n\n\/* — EXPENSES — *\/\nfunction rExpenses(sub){\n  const tot=S.expenses.reduce((s,e)=>s+Number(e.amount),0);\n  const byCat={};S.expenses.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+Number(e.amount);});\n  sub.innerHTML=\`\n    <button class=\"btn btn-p\" onclick=\"openExpMo()\">+ Add Expense<\/button>\n    ${S.expenses.length>0?\`\n    <div class=\"card\" style=\"margin-top:13px;\">\n      <div class=\"card-lbl\">Spending Breakdown · ${fmt(tot)}<\/div>\n      ${Object.entries(byCat).map(([cat,amt])=>{\n        const inf=EC[cat]||EC.other;const p=tot?(amt\/tot)*100:0;\n        return\`<div style=\"margin-bottom:9px;\">\n          <div style=\"display:flex;justify-content:space-between;margin-bottom:3px;\">\n            <span style=\"font-size:12px;\">${inf.em} ${inf.lb}<\/span>\n            <span style=\"font-size:12px;color:${inf.col};font-weight:600;\">${fmt(amt)}<\/span>\n          <\/div>\n          <div class=\"pt\" style=\"height:4px\"><div class=\"pf\" style=\"width:${p.toFixed(0)}%;background:${inf.col};\"><\/div><\/div>\n        <\/div>\`;\n      }).join('')}\n    <\/div>\`:''}\n    <div id=\"el\" style=\"margin-top:4px;\"><\/div>\`;\n  const list=document.getElementById('el');\n  if(!S.expenses.length){list.innerHTML=\`<div class=\"empty\" style=\"padding:24px 0\"><span class=\"empty-ic\" style=\"font-size:28px\">🧾<\/span>No expenses added<\/div>\`;return;}\n  S.expenses.forEach((e,i)=>{\n    const cat=EC[e.category]||EC.other;\n    const d=document.createElement('div');d.className='card ani';d.style.animationDelay=\`${i*0.04}s\`;d.style.borderLeft=\`3px solid ${cat.col}\`;\n    d.innerHTML=\`<div style=\"display:flex;justify-content:space-between;align-items:center;\">\n      <div><div style=\"font-size:14px;font-weight:600;\">${cat.em} ${e.name}<\/div>\n        <div style=\"font-size:10px;color:var(--tm);margin-top:2px;\">${cat.lb}${e.recurring==='yes'?' · Recurring':''}<\/div>\n      <\/div>\n      <div style=\"text-align:right;\"><div class=\"n-sm\" style=\"color:${cat.col};\">${fmt(e.amount)}<\/div>\n        <button class=\"btn-d\" style=\"margin-top:4px;\" onclick=\"removeExp('${e.id}')\">Remove<\/button>\n      <\/div>\n    <\/div>\`;\n    list.appendChild(d);\n  });\n}\nfunction openExpMo(){\n  openMo(moH('Add Expense')+\`\n    <div class=\"field\"><label>Name<\/label><input id=\"en\" class=\"fi\" placeholder=\"Groceries, Netflix, Gym…\"\/><\/div>\n    <div class=\"field\"><label>Category<\/label><select id=\"ec\" class=\"fi\">${Object.entries(EC).map(([v,o])=>\`<option value=\"${v}\">${o.em} ${o.lb}<\/option>\`).join('')}<\/select><\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Amount<\/label><input type=\"number\" id=\"ea\" class=\"fi\" placeholder=\"200\"\/><\/div>\n      <div class=\"field\"><label>Date<\/label><input type=\"date\" id=\"ed\" class=\"fi\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Recurring?<\/label><select id=\"er\" class=\"fi\"><option value=\"no\">One-time<\/option><option value=\"yes\">Monthly<\/option><\/select><\/div>\n    <button class=\"btn btn-p\" onclick=\"saveExp()\">Save<\/button>\`);\n}\nfunction saveExp(){\n  const nm=document.getElementById('en').value.trim(),am=document.getElementById('ea').value;\n  if(!nm||!am)return;\n  S.expenses.push({id:uid(),name:nm,amount:Number(am),category:document.getElementById('ec').value,date:document.getElementById('ed').value,recurring:document.getElementById('er').value});\n  save();closeMo();rMoney();\n}\nfunction removeExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);save();rMoney();}\n\n\/* ══════════════════════════════════════════\n   INVEST TAB\n══════════════════════════════════════════ *\/\nconst XT={isa:{lb:'Cash ISA',em:'🏛️',col:'var(--blue)'},stocks_isa:{lb:'Stocks & Shares ISA',em:'📈',col:'var(--teal)'},pension:{lb:'Pension \/ SIPP',em:'🧓',col:'var(--gem2)'},stocks:{lb:'Stocks \/ Shares',em:'📊',col:'var(--amber)'},crypto:{lb:'Crypto',em:'₿',col:'var(--amber)'},savings_acc:{lb:'Savings Account',em:'🏦',col:'var(--rose)'},property:{lb:'Property',em:'🏠',col:'var(--blue)'},bonds:{lb:'Bonds \/ Gilts',em:'📜',col:'var(--tm)'},app:{lb:'Savings App',em:'📱',col:'var(--gem)'},other:{lb:'Other',em:'💼',col:'var(--tm)'}};\nlet selXT='isa';\n\nfunction rInvest(){\n  const el=document.getElementById('tab-body');\n  const tot=S.external.reduce((s,e)=>s+Number(e.balance),0);\n  const totR=S.external.reduce((s,e)=>s+Number(e.returns||0),0);\n  el.innerHTML=\`\n    <div style=\"background:linear-gradient(155deg,#081820,#0c0a1e);border:1px solid rgba(52,213,160,0.13);border-radius:22px;padding:22px;margin-bottom:13px;\">\n      <div style=\"font-size:9px;color:var(--teal);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:5px;font-weight:700;\">Portfolio Value<\/div>\n      <div class=\"n-big\" style=\"color:var(--teal);\">${fmt(tot)}<\/div>\n      ${totR>0?\`<div style=\"font-size:12px;color:rgba(52,213,160,0.55);margin-top:4px;\">+${fmt(totR)} estimated returns<\/div>\`:''}\n      <div style=\"font-size:12px;color:var(--tm);margin-top:10px;line-height:1.6;\">Track ISAs, pensions, stocks, crypto, and savings apps — all in one place alongside your other finances.<\/div>\n    <\/div>\n    <button class=\"btn btn-p\" onclick=\"openExtMo()\">+ Add Investment or Savings<\/button>\n    <div id=\"xt-list\" style=\"margin-top:14px;\"><\/div>\`;\n  const list=document.getElementById('xt-list');\n  if(!S.external.length){list.innerHTML=\`<div class=\"empty\"><span class=\"empty-ic\">📈<\/span>No investments tracked yet<\/div>\`;return;}\n  S.external.forEach((e,i)=>{\n    const t=XT[e.type]||XT.other;\n    const d=document.createElement('div');d.className='card ani';d.style.animationDelay=\`${i*0.04}s\`;d.style.borderLeft=\`3px solid ${t.col}\`;\n    d.innerHTML=\`<div style=\"display:flex;justify-content:space-between;align-items:flex-start;\">\n      <div style=\"flex:1;min-width:0;padding-right:10px;\">\n        <div style=\"font-size:15px;font-weight:700;\">${t.em} ${e.name}<\/div>\n        <div style=\"font-size:10px;color:${t.col};margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;\">${t.lb}<\/div>\n        ${e.platform?\`<div style=\"font-size:11px;color:var(--tm);margin-top:2px;\">via ${e.platform}<\/div>\`:''}\n        ${e.notes?\`<div style=\"font-size:11px;color:var(--td);margin-top:4px;font-style:italic;\">${e.notes}<\/div>\`:''}\n      <\/div>\n      <div style=\"text-align:right;flex-shrink:0;\">\n        <div class=\"n-sm\" style=\"color:${t.col};\">${fmt(e.balance)}<\/div>\n        ${Number(e.returns)>0?\`<div style=\"font-size:11px;color:var(--teal);margin-top:2px;\">+${fmt(e.returns)}<\/div>\`:''}\n        <button class=\"btn-d\" style=\"margin-top:6px;\" onclick=\"removeExt('${e.id}')\">Remove<\/button>\n      <\/div>\n    <\/div>\`;\n    list.appendChild(d);\n  });\n}\nfunction openExtMo(){\n  openMo(moH('Add Investment \/ Savings')+\`\n    <div class=\"field\"><label>Account Name<\/label><input id=\"xn\" class=\"fi\" placeholder=\"e.g. Vanguard ISA, Moneybox, Freetrade…\"\/><\/div>\n    <div class=\"field\"><label>Type<\/label>\n      <div class=\"etg\" id=\"etg\">${Object.entries(XT).map(([v,o])=>\`<div class=\"etb ${v==='isa'?'on':''}\" id=\"etb-${v}\" onclick=\"pickXT('${v}')\"><span class=\"etb-ic\">${o.em}<\/span><span class=\"etb-nm\">${o.lb}<\/span><\/div>\`).join('')}<\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n      <div class=\"field\"><label>Current Balance<\/label><input type=\"number\" id=\"xb\" class=\"fi\" placeholder=\"5000\"\/><\/div>\n      <div class=\"field\"><label>Returns \/ Gains<\/label><input type=\"number\" id=\"xr\" class=\"fi\" placeholder=\"0\"\/><\/div>\n    <\/div>\n    <div class=\"field\"><label>Platform \/ Provider<\/label><input id=\"xp\" class=\"fi\" placeholder=\"e.g. Hargreaves Lansdown, Moneybox…\"\/><\/div>\n    <div class=\"field\"><label>Notes<\/label><textarea id=\"xo\" class=\"fi\" placeholder=\"e.g. £200 auto-invest monthly, 4.5% interest…\"><\/textarea><\/div>\n    <button class=\"btn btn-p\" onclick=\"saveExt()\">Save<\/button>\`);\n  selXT='isa';\n}\nfunction pickXT(v){\n  selXT=v;\n  document.querySelectorAll('.etb').forEach(b=>{b.classList.toggle('on',b.id===\`etb-${v}\`);});\n}\nfunction saveExt(){\n  const nm=document.getElementById('xn').value.trim(),bal=document.getElementById('xb').value;\n  if(!nm||!bal)return;\n  S.external.push({id:uid(),name:nm,type:selXT,balance:Number(bal),returns:Number(document.getElementById('xr').value)||0,platform:document.getElementById('xp').value,notes:document.getElementById('xo').value});\n  save();closeMo();rInvest();\n}\nfunction removeExt(id){S.external=S.external.filter(e=>e.id!==id);save();rInvest();}\n\n\/* ══════════════════════════════════════════\n   PROFILE TAB\n══════════════════════════════════════════ *\/\nfunction rProfile(){\n  const el=document.getElementById('tab-body');\n  const p=S.profile;\n  el.innerHTML=\`\n    <div style=\"display:flex;flex-direction:column;align-items:center;padding:28px 0 20px;\">\n      <div class=\"ava-wrap\" onclick=\"pickPhoto()\">\n        ${p.photo?\`<img src=\"${p.photo}\" alt=\"Profile photo\"\/>\`:\`<span style=\"font-size:42px;\">👤<\/span>\`}\n        <div class=\"ava-edit\">📷<\/div>\n      <\/div>\n      <input type=\"file\" id=\"ph-in\" accept=\"image\/*\" style=\"display:none\" onchange=\"onPhoto(event)\"\/>\n      <div style=\"margin-top:14px;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;background:linear-gradient(135deg,#c4abff,#e87ca0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\">${p.name||'Your Name'}<\/div>\n      ${p.bio?\`<div style=\"font-size:13px;color:var(--tm);text-align:center;margin-top:6px;padding:0 32px;font-style:italic;\">\"${p.bio}\"<\/div>\`:''}\n    <\/div>\n\n    <div class=\"card\">\n      <div class=\"card-lbl\">Edit Profile<\/div>\n      <div class=\"field\"><label>Name<\/label><input id=\"pr-n\" class=\"fi\" value=\"${p.name||''}\" placeholder=\"Your full name\"\/><\/div>\n      <div class=\"field\"><label>Profile Message<\/label><textarea id=\"pr-b\" class=\"fi\" placeholder=\"e.g. Building my future one day at a time ✨\">${p.bio||''}<\/textarea><\/div>\n      <button class=\"btn btn-p\" onclick=\"saveProfile()\">Save Profile<\/button>\n    <\/div>\n\n    <div class=\"sh\">Settings<\/div>\n    <div class=\"card\">\n      ${[\n        ['Currency',\`${S.currency.name} (${S.currency.code})\`,'openCurModal()'],\n        ['Monthly Income',S.income>0?fmt(S.income):'Not set','openIncModal()'],\n        ['Export to Excel','Download all data','doExcel()'],\n      ].map(([lb,sub,fn])=>\`\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--b0);\">\n        <div><div style=\"font-size:14px;font-weight:500;\">${lb}<\/div><div style=\"font-size:11px;color:var(--tm);margin-top:1px;\">${sub}<\/div><\/div>\n        <button class=\"btn-g\" onclick=\"${fn}\">Edit<\/button>\n      <\/div>\`).join('')}\n      <div style=\"height:2px;\"><\/div>\n    <\/div>\n\n    <div class=\"sh\">About GEODE<\/div>\n    <div class=\"card\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\">\n        <svg width=\"34\" height=\"34\" viewBox=\"0 0 100 100\" fill=\"none\">\n          <path d=\"M50 8 L78 22 L65 50 L50 8Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M78 22 L92 50 L65 50 L78 22Z\" fill=\"#9b7fe8\" opacity=\"0.75\"\/>\n          <path d=\"M92 50 L78 78 L65 50 L92 50Z\" fill=\"#e87ca0\" opacity=\"0.9\"\/>\n          <path d=\"M78 78 L50 92 L50 65 L78 78Z\" fill=\"#c4abff\" opacity=\"0.65\"\/>\n          <path d=\"M50 92 L22 78 L50 65 L50 92Z\" fill=\"#9b7fe8\" opacity=\"0.85\"\/>\n          <path d=\"M22 78 L8 50 L35 50 L22 78Z\" fill=\"#e87ca0\" opacity=\"0.75\"\/>\n          <path d=\"M8 50 L22 22 L35 50 L8 50Z\" fill=\"#c4abff\" opacity=\"0.9\"\/>\n          <path d=\"M22 22 L50 8 L50 35 L22 22Z\" fill=\"#9b7fe8\" opacity=\"0.95\"\/>\n          <path d=\"M50 35 L65 50 L50 65 L35 50Z\" fill=\"white\" opacity=\"0.18\"\/>\n        <\/svg>\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,#c4abff,#e87ca0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\">GEODE<\/div>\n          <div style=\"font-size:9.5px;color:var(--tm);letter-spacing:0.1em;\">Your Financial Crystal · v4.0<\/div>\n        <\/div>\n      <\/div>\n      <div style=\"font-size:12px;color:var(--tm);line-height:1.7;\">GEODE helps you see your complete financial picture in one beautiful place — goals, savings, investments, debts, and spending — so you can grow with clarity and confidence. All data stays privately on your device.<\/div>\n    <\/div>\n\n    <div class=\"sh\" style=\"color:var(--red);\">Danger Zone<\/div>\n    <div class=\"card\" style=\"border-color:rgba(240,112,112,0.12);\">\n      <div style=\"font-size:12px;color:var(--tm);margin-bottom:12px;\">Permanently deletes all GEODE data from this device.<\/div>\n      <button onclick=\"resetAll()\" style=\"width:100%;background:rgba(240,112,112,0.1);border:1px solid rgba(240,112,112,0.2);border-radius:12px;padding:12px;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;\">Reset All Data<\/button>\n    <\/div>\n    <div style=\"height:10px;\"><\/div>\`;\n}\nfunction saveProfile(){S.profile.name=document.getElementById('pr-n').value.trim();S.profile.bio=document.getElementById('pr-b').value.trim();save();rProfile();}\nfunction pickPhoto(){document.getElementById('ph-in').click();}\nfunction onPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.profile.photo=ev.target.result;save();rProfile();};r.readAsDataURL(f);}\nfunction resetAll(){if(confirm('Delete ALL data? This cannot be undone.')){localStorage.removeItem(KEY);location.reload();}}\n\n\/* ══════════════════════════════════════════\n   EXCEL EXPORT\n══════════════════════════════════════════ *\/\nfunction doExcel(){\n  if(typeof XLSX==='undefined'){alert('Export library not loaded. Please check your internet connection.');return;}\n  const wb=XLSX.utils.book_new();\n  const c=S.currency.code;\n  \/\/ Summary\n  const sum=[['GEODE Finance Export',''],['Date',new Date().toLocaleDateString()],['User',S.profile.name||''],['Currency',c],[''],\n    ['SUMMARY',''],\n    ['Monthly Income',Number(S.income)||0],\n    ['Total Debt',S.debts.reduce((s,d)=>s+Number(d.balance),0)],\n    ['Upcoming Payments',S.payments.filter(p=>p.status==='upcoming').reduce((s,p)=>s+Number(p.amount),0)],\n    ['Planned Expenses',S.expenses.reduce((s,e)=>s+Number(e.amount),0)],\n    ['Goals Saved',S.goals.reduce((s,g)=>s+Number(g.saved),0)],\n    ['Investments \/ External',S.external.reduce((s,e)=>s+Number(e.balance),0)],\n    ['Net Worth (Saved+Invest-Debt)',S.goals.reduce((s,g)=>s+Number(g.saved),0)+S.external.reduce((s,e)=>s+Number(e.balance),0)-S.debts.reduce((s,d)=>s+Number(d.balance),0)],\n  ];\n  const ws0=XLSX.utils.aoa_to_sheet(sum);ws0['!cols']=[{wch:30},{wch:20}];\n  XLSX.utils.book_append_sheet(wb,ws0,'Summary');\n  if(S.goals.length){\n    const rows=[['Goal Name','Category','Target ('+c+')','Saved ('+c+')','Remaining ('+c+')','Progress %','Monthly ('+c+')','Target Date'],\n      ...S.goals.map(g=>[g.name,GC[g.category]?.lb||g.category,Number(g.amount),Number(g.saved),Math.max(0,Number(g.amount)-Number(g.saved)),Number(g.amount)>0?+(((Number(g.saved)\/Number(g.amount))*100).toFixed(1)):0,Number(g.monthly)||0,g.targetDate?fmtD(g.targetDate):''])];\n    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:24},{wch:18},{wch:14},{wch:14},{wch:14},{wch:12},{wch:14},{wch:16}];\n    XLSX.utils.book_append_sheet(wb,ws,'Goals');\n  }\n  if(S.debts.length){\n    const rows=[['Name','Category','Balance ('+c+')','APR %','Min Payment ('+c+')'],\n      ...S.debts.map(d=>[d.name,DC[d.category]?.lb||d.category,Number(d.balance),Number(d.interest)||0,Number(d.minPayment)||0])];\n    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:24},{wch:18},{wch:14},{wch:10},{wch:18}];\n    XLSX.utils.book_append_sheet(wb,ws,'Debts');\n  }\n  if(S.payments.length){\n    const rows=[['Name','Amount ('+c+')','Due Date','Status'],\n      ...S.payments.map(p=>[p.name,Number(p.amount),p.dueDate?fmtD(p.dueDate):'',p.status])];\n    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:24},{wch:14},{wch:16},{wch:12}];\n    XLSX.utils.book_append_sheet(wb,ws,'Payments');\n  }\n  if(S.expenses.length){\n    const rows=[['Name','Category','Amount ('+c+')','Date','Recurring'],\n      ...S.expenses.map(e=>[e.name,EC[e.category]?.lb||e.category,Number(e.amount),e.date?fmtD(e.date):'',e.recurring==='yes'?'Yes':'No'])];\n    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:24},{wch:18},{wch:14},{wch:14},{wch:10}];\n    XLSX.utils.book_append_sheet(wb,ws,'Expenses');\n  }\n  if(S.external.length){\n    const rows=[['Name','Type','Platform','Balance ('+c+')','Returns ('+c+')','Notes'],\n      ...S.external.map(e=>[e.name,XT[e.type]?.lb||e.type,e.platform||'',Number(e.balance),Number(e.returns)||0,e.notes||''])];\n    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:24},{wch:20},{wch:22},{wch:14},{wch:14},{wch:32}];\n    XLSX.utils.book_append_sheet(wb,ws,'Investments');\n  }\n  XLSX.writeFile(wb,\`GEODE_Finance_${new Date().toISOString().slice(0,10)}.xlsx\`);\n}\n<\/script>\n<\/body>\n<\/html>
